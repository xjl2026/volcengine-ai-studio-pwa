name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject build version
        run: |
          BUILD_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          CACHE_VER="volc-ai-$(date +%s)"
          echo "Build: $BUILD_TIME | Cache: $CACHE_VER"
          sed -i "s|APP_BUILD = '[^']*'|APP_BUILD = '$BUILD_TIME'|g" app.js
          sed -i "s|CACHE_NAME = '[^']*'|CACHE_NAME = '$CACHE_VER'|g" sw.js
          # 注入版本号和构建时间到 HTML（部署时直接写入，不依赖 JS）
          APP_VER=$(grep "APP_VERSION" app.js | head -1 | sed "s/.*'\(.*\)'.*/\\1/")
          sed -i "s|<span id=\"versionText\">[^<]*</span>|<span id=\"versionText\">v$APP_VER</span>|g" index.html
          sed -i "s|<span id=\"versionDate\">[^<]*</span>|<span id=\"versionDate\">$BUILD_TIME</span>|g" index.html
          echo "Version: v$APP_VER"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
